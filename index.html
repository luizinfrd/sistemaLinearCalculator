<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Sistemas Lineares</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #f6f4ef;
      --bg-card: rgba(255, 255, 255, 0.82);
      --bg-strong: #1a2b42;
      --bg-soft: #e8f0ff;
      --text-main: #172033;
      --text-muted: #4d5667;
      --text-light: #f5f7fb;
      --accent: #e76f51;
      --accent-strong: #d95f40;
      --line: #d3d9e4;
      --line-strong: #9dacbf;
      --ok: #1c7c54;
      --warn: #8a5a00;
      --bad: #a12626;
      --radius-md: 12px;
      --radius-lg: 20px;
      --shadow-lg: 0 18px 50px rgba(20, 33, 52, 0.16);
      --shadow-md: 0 10px 25px rgba(20, 33, 52, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Space Grotesk", sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at 10% -10%, #f5b7a6 0%, transparent 34%),
        radial-gradient(circle at 95% 0%, #bfd3ff 0%, transparent 38%),
        linear-gradient(145deg, #f9f7f3, #eef4ff 45%, #f6f4ef);
      padding: 2.2rem 1rem;
    }

    .page {
      width: min(1100px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 1.2rem;
      animation: pageIn 560ms ease;
    }

    .hero {
      background: var(--bg-strong);
      color: var(--text-light);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      padding: 1.5rem 1.6rem;
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 0%, rgba(255, 255, 255, 0.12) 55%, transparent 100%);
      transform: translateX(-100%);
      animation: shine 2.8s ease 300ms 1;
      z-index: -1;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(1.35rem, 2.6vw, 2rem);
      letter-spacing: 0.03em;
    }

    .hero p {
      margin: 0.5rem 0 0;
      color: #d7dff0;
      max-width: 55ch;
      line-height: 1.5;
      font-size: 0.95rem;
    }

    .panel {
      background: var(--bg-card);
      backdrop-filter: blur(6px);
      border-radius: var(--radius-lg);
      border: 1px solid rgba(255, 255, 255, 0.55);
      box-shadow: var(--shadow-md);
      padding: 1.35rem;
    }

    .panel h2 {
      margin: 0 0 1rem;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #324157;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 0.9rem;
      align-items: end;
    }

    .field {
      display: grid;
      gap: 0.35rem;
    }

    .field label {
      font-size: 0.88rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    input[type="number"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: 0.66rem 0.75rem;
      font-size: 0.96rem;
      font-family: "Space Grotesk", sans-serif;
      color: var(--text-main);
      background: #ffffff;
      outline: none;
      transition: border-color 180ms ease, box-shadow 180ms ease;
    }

    input[type="number"]:focus {
      border-color: #89a8e5;
      box-shadow: 0 0 0 3px rgba(137, 168, 229, 0.2);
    }

    .btn {
      border: 0;
      border-radius: var(--radius-md);
      background: linear-gradient(135deg, var(--accent), #ef9069);
      color: #fff;
      font-weight: 700;
      font-size: 0.93rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      padding: 0.74rem 1rem;
      cursor: pointer;
      transition: transform 160ms ease, filter 160ms ease;
      min-height: 42px;
    }

    .btn:hover {
      transform: translateY(-1px);
      filter: brightness(0.98);
    }

    .btn:active {
      transform: translateY(0);
      filter: brightness(0.95);
    }

    .btn.alt {
      background: linear-gradient(135deg, #2b4f7a, #3b668f);
    }

    .matrix-wrap {
      display: grid;
      gap: 0.85rem;
      margin-top: 0.4rem;
      overflow-x: auto;
    }

    .matrix-meta {
      margin: 0;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .matrix-table,
    .escalonada-table {
      border-collapse: separate;
      border-spacing: 0;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.9rem;
      width: fit-content;
    }

    .matrix-table td,
    .escalonada-table td {
      padding: 0.42rem;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      background: #f9fbff;
    }

    .matrix-table tr:first-child td,
    .escalonada-table tr:first-child td {
      border-top: 1px solid var(--line);
    }

    .matrix-table td:first-child,
    .escalonada-table td:first-child {
      border-left: 1px solid var(--line);
    }

    .matrix-table td.divisor,
    .escalonada-table td.divisor {
      border-right: 2px solid var(--line-strong);
    }

    .matrix-input {
      width: 74px;
      min-width: 74px;
      text-align: center;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.86rem;
      padding: 0.52rem 0.4rem;
    }

    .result-card {
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      background: #ffffff;
      padding: 1.1rem;
      animation: fadeUp 360ms ease;
    }

    .result-badge {
      display: inline-block;
      border-radius: 999px;
      padding: 0.35rem 0.75rem;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .result-badge.spd {
      background: rgba(28, 124, 84, 0.14);
      color: var(--ok);
    }

    .result-badge.spi {
      background: rgba(138, 90, 0, 0.14);
      color: var(--warn);
    }

    .result-badge.si {
      background: rgba(161, 38, 38, 0.14);
      color: var(--bad);
    }

    .solution {
      margin-top: 0.9rem;
      line-height: 1.6;
      color: var(--text-main);
    }

    .grid {
      display: grid;
      gap: 1.2rem;
      grid-template-columns: 1fr;
    }

    @media (min-width: 900px) {
      .grid {
        grid-template-columns: 1.08fr 1fr;
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(9px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pageIn {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes shine {
      from {
        transform: translateX(-100%);
      }
      to {
        transform: translateX(100%);
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <h1>Calculadora de Sistemas Lineares</h1>
      <p>Monte a matriz aumentada [A|b], aplique eliminação de Gauss e veja a classificação do sistema em segundos.</p>
    </section>

    <div class="grid">
      <section class="panel">
        <h2>Configuração</h2>
        <div class="controls">
          <div class="field">
            <label for="numEquations">Número de equações</label>
            <input type="number" id="numEquations" min="1" max="10" value="3">
          </div>

          <div class="field">
            <label for="numVariables">Número de variáveis</label>
            <input type="number" id="numVariables" min="1" max="10" value="3">
          </div>

          <button class="btn" id="generateBtn" type="button" onclick="gerarMatriz()">Gerar matriz</button>
        </div>
      </section>

      <section class="panel">
        <h2>Resultado</h2>
        <div id="resultContainer">
          <p class="matrix-meta">Gere e resolva uma matriz para ver a classificação.</p>
        </div>
      </section>
    </div>

    <section class="panel">
      <h2>Matriz Aumentada</h2>
      <div id="matrixContainer"></div>
    </section>
  </main>

  <script>
    function clampValue(value, min, max, fallback) {
      const num = parseInt(value, 10);
      if (Number.isNaN(num)) return fallback;
      return Math.max(min, Math.min(max, num));
    }

    function gerarMatriz() {
      const mInput = document.getElementById("numEquations");
      const nInput = document.getElementById("numVariables");

      const m = clampValue(mInput.value, 1, 10, 3);
      const n = clampValue(nInput.value, 1, 10, 3);

      mInput.value = m;
      nInput.value = n;

      let html = "";
      html += '<p class="matrix-meta">Preencha os coeficientes e o termo independente da matriz [A|b].</p>';
      html += '<div class="matrix-wrap">';
      html += '<table class="matrix-table" aria-label="Matriz aumentada">';

      for (let i = 0; i < m; i++) {
        html += "<tr>";
        for (let j = 0; j < n + 1; j++) {
          const divisorClass = j === n ? " divisor" : "";
          html += `<td class="${divisorClass.trim()}">`;
          html += `<input type="number" class="matrix-input" id="a${i}_${j}" value="${Math.round(Math.random() * 10 - 5)}" step="0.01">`;
          html += "</td>";
        }
        html += "</tr>";
      }

      html += "</table>";
      html += `<button class="btn alt" type="button" onclick="resolver(${m}, ${n})">Resolver sistema</button>`;
      html += "</div>";

      document.getElementById("matrixContainer").innerHTML = html;
      document.getElementById("resultContainer").innerHTML = '<p class="matrix-meta">Pressione <strong>Resolver sistema</strong> para calcular.</p>';
    }

    function resolver(m, n) {
      let matriz = [];
      for (let i = 0; i < m; i++) {
        let linha = [];
        for (let j = 0; j < n + 1; j++) {
          linha.push(parseFloat(document.getElementById(`a${i}_${j}`).value) || 0);
        }
        matriz.push(linha);
      }

      let A = JSON.parse(JSON.stringify(matriz));

      let rank = 0;
      for (let col = 0; col < n && rank < m; col++) {
        let pivot = rank;
        for (let row = rank + 1; row < m; row++) {
          if (Math.abs(A[row][col]) > Math.abs(A[pivot][col])) {
            pivot = row;
          }
        }

        if (Math.abs(A[pivot][col]) < 1e-10) continue;

        [A[rank], A[pivot]] = [A[pivot], A[rank]];

        for (let row = rank + 1; row < m; row++) {
          const fator = A[row][col] / A[rank][col];
          for (let j = col; j < n + 1; j++) {
            A[row][j] -= fator * A[rank][j];
          }
        }
        rank++;
      }

      let rankB = rank;
      for (let row = rank; row < m; row++) {
        let temNaoZero = false;
        for (let col = 0; col < n; col++) {
          if (Math.abs(A[row][col]) > 1e-10) {
            temNaoZero = true;
            break;
          }
        }

        if (temNaoZero) {
          rankB = m;
          break;
        }

        if (Math.abs(A[row][n]) > 1e-10) {
          rankB = m;
          break;
        }
      }

      let classificacao = "";
      let solucao = "";
      let badgeClass = "";

      if (rank < rankB) {
        classificacao = "SI (Sem solução - Sistema impossível)";
        solucao = "O sistema não tem solução: existe ao menos uma linha do tipo 0 = constante não nula.";
        badgeClass = "si";
      } else if (rank === n) {
        classificacao = "SPD (Uma única solução - Sistema possível determinado)";
        badgeClass = "spd";

        let x = new Array(n).fill(0);
        for (let i = Math.min(rank, n) - 1; i >= 0; i--) {
          let sum = A[i][n];
          for (let j = i + 1; j < n; j++) {
            sum -= A[i][j] * x[j];
          }
          x[i] = sum / A[i][i];
        }

        solucao = '<div><strong>Solução encontrada:</strong></div>';
        for (let i = 0; i < n; i++) {
          solucao += `x<sub>${i + 1}</sub> = ${x[i].toFixed(4)}<br>`;
        }
      } else {
        classificacao = "SPI (Infinitas soluções - Sistema possível indeterminado)";
        const varLivre = n - rank;
        solucao = `O sistema tem ${varLivre} variável(is) livre(s).`;
        badgeClass = "spi";
      }

      const resultado = `
        <div class="result-card">
          <span class="result-badge ${badgeClass}">Classificação</span>
          <div class="solution"><strong>${classificacao}</strong></div>
          <div class="solution">${solucao}</div>
          <div class="solution">
            <strong>Matriz escalonada:</strong>
            <div class="matrix-wrap">${gerarTabelaEscalonada(A, m, n)}</div>
          </div>
        </div>
      `;

      document.getElementById("resultContainer").innerHTML = resultado;
    }

    function gerarTabelaEscalonada(A, m, n) {
      let html = '<table class="escalonada-table" aria-label="Matriz escalonada">';
      for (let i = 0; i < m; i++) {
        html += "<tr>";
        for (let j = 0; j < n + 1; j++) {
          const val = A[i][j].toFixed(4);
          const divisorClass = j === n ? " divisor" : "";
          html += `<td class="${divisorClass.trim()}" style="text-align: right; min-width: 76px;">${val}</td>`;
        }
        html += "</tr>";
      }
      html += "</table>";
      return html;
    }

    gerarMatriz();
  </script>
</body>
</html>
